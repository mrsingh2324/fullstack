
apiVersion: v1
kind: Namespace
metadata:
  name: mern

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
  namespace: mern
spec:
  replicas: 2
  selector: { matchLabels: { app: auth } }
  template:
    metadata: { labels: { app: auth } }
    spec:
      containers:
        - name: auth
          image: gcr.io/PROJECT_ID/auth:latest
          ports: [{ containerPort: 4000 }]

---
apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: mern
spec:
  selector: { app: auth }
  ports: [{ port: 4000, targetPort: 4000 }]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: books
  namespace: mern
spec:
  replicas: 2
  selector: { matchLabels: { app: books } }
  template:
    metadata: { labels: { app: books } }
    spec:
      containers:
        - name: books
          image: gcr.io/PROJECT_ID/books:latest
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mongo-secret
                  key: uri
          ports: [{ containerPort: 5000 }]

---
apiVersion: v1
kind: Service
metadata:
  name: books
  namespace: mern
spec:
  selector: { app: books }
  ports: [{ port: 5000, targetPort: 5000 }]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: mern
spec:
  replicas: 2
  selector: { matchLabels: { app: gateway } }
  template:
    metadata: { labels: { app: gateway } }
    spec:
      containers:
        - name: gateway
          image: gcr.io/PROJECT_ID/gateway:latest
          env:
            - name: AUTH_URL
              value: http://auth:4000
            - name: BOOKS_URL
              value: http://books:5000
          ports: [{ containerPort: 3000 }]

---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: mern
spec:
  type: LoadBalancer
  selector: { app: gateway }
  ports: [{ port: 80, targetPort: 3000 }]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: mern
spec:
  replicas: 2
  selector: { matchLabels: { app: frontend } }
  template:
    metadata: { labels: { app: frontend } }
    spec:
      containers:
        - name: frontend
          image: gcr.io/PROJECT_ID/frontend:latest
          ports: [{ containerPort: 80 }]

---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: mern
spec:
  type: LoadBalancer
  selector: { app: frontend }
  ports: [{ port: 80, targetPort: 80 }]
