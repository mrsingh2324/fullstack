name: CI-CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker
        run: gcloud auth configure-docker --quiet

      - name: Build and Push Auth
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth
          push: true
          tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/mern-auth:${{ github.sha }}

      - name: Build and Push Books
        uses: docker/build-push-action@v5
        with:
          context: ./services/books
          push: true
          tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/mern-books:${{ github.sha }}

      - name: Build and Push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: true
          tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/mern-gateway:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: gcr.io/${{ secrets.GCP_PROJECT_ID }}/mern-frontend:${{ github.sha }}

  deploy-gcp:
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy Auth to Cloud Run
        run: |
          gcloud run deploy mern-auth \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/mern-auth:${{ github.sha }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --quiet

      - name: Deploy Books to Cloud Run
        run: |
          gcloud run deploy mern-books \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/mern-books:${{ github.sha }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --quiet

      - name: Deploy Gateway to Cloud Run
        run: |
          gcloud run deploy mern-gateway \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/mern-gateway:${{ github.sha }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --quiet

      - name: Deploy Frontend to Cloud Run
        run: |
          gcloud run deploy mern-frontend \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/mern-frontend:${{ github.sha }} \
            --platform managed \
            --region ${{ secrets.GCP_REGION }} \
            --allow-unauthenticated \
            --quiet

      - name: Output URLs
        run: |
          echo "=== Deployment Complete ==="
          echo "Frontend: $(gcloud run services describe mern-frontend --platform managed --region ${{ secrets.GCP_REGION }} --format 'value(status.url)')"
          echo "Gateway: $(gcloud run services describe mern-gateway --platform managed --region ${{ secrets.GCP_REGION }} --format 'value(status.url)')"
