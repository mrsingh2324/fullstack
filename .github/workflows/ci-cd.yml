name: CI (Build & Push to Docker Hub)

on:
  push:
    branches: [ "main" ]

jobs:
  build-push:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Auth
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/mern-auth:${{ github.sha }}

      - name: Build and Push Books
        uses: docker/build-push-action@v5
        with:
          context: ./services/books
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/mern-books:${{ github.sha }}

      - name: Build and Push Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./services/api-gateway
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/mern-gateway:${{ github.sha }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_HUB_USERNAME }}/mern-frontend:${{ github.sha }}

      - name: Output Image Tag
        run: echo "Images pushed. Tag: ${{ github.sha }}"
